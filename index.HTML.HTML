<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI影像诊断 · 手机端</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone {
            width: 375px;
            height: 667px;
            background: #f5f5f7;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 80px;
            background: #f8fafc;
            scrollbar-width: none;
        }

        .content::-webkit-scrollbar {
            display: none;
        }

        .tab-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 70px;
            background: white;
            border-top: 1px solid #f1f5f9;
            position: absolute;
            bottom: 0;
            width: 100%;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.02);
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: #94a3b8;
            cursor: pointer;
            flex: 1;
            padding: 8px 0;
            transition: all 0.2s;
        }

        .tab-item.active {
            color: #667eea;
        }

        .tab-icon {
            font-size: 22px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            border: 1px solid #f1f5f9;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px -1px rgba(102,126,234,0.3);
            transition: all 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-outline {
            background: white;
            border: 1px solid #e2e8f0;
            color: #64748b;
            box-shadow: none;
        }

        .camera-area {
            background: linear-gradient(145deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px dashed #cbd5e1;
            cursor: pointer;
        }

        .camera-icon {
            font-size: 60px;
            margin-bottom: 12px;
            color: #667eea;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .item-icon {
            font-size: 28px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .item-title {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .item-sub {
            font-size: 13px;
            color: #64748b;
        }

        .badge {
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-waiting {
            background: #fef3c7;
            color: #d97706;
        }

        .badge-done {
            background: #d1fae5;
            color: #059669;
        }

        .badge-blue {
            background: #e0f2fe;
            color: #0284c7;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            margin-top: 10px;
        }

        .back {
            font-size: 28px;
            cursor: pointer;
            color: #667eea;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .header-title {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .progress {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 40px 0;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #cbd5e1;
            border-radius: 5px;
            animation: pulse 1.2s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 100% { background: #cbd5e1; width: 10px; }
            50% { background: #667eea; width: 20px; }
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 16px 12px;
            text-align: center;
            border: 1px solid #f1f5f9;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: #64748b;
        }

        .result-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .checkmark {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #d1fae5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            color: #059669;
            font-size: 30px;
        }

        /* 相册网格 */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            margin-bottom: 20px;
        }

        .photo-item {
            width: 100%;
            aspect-ratio: 1;
            background: #f1f5f9;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #64748b;
            cursor: pointer;
            border: 2px solid transparent;
            overflow: hidden;
        }

        .photo-item.selected {
            border-color: #667eea;
        }

        .photo-item svg {
            width: 100%;
            height: 100%;
        }

        /* 模拟相机全屏样式 */
        .camera-fullscreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .camera-view {
            flex: 1;
            background: #1a1a1a;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* X光容器 */
        .xray-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .xray-svg {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
        }

        /* 标注圆圈 */
        .xray-mark-circle {
            position: absolute;
            width: 70px;
            height: 70px;
            border: 4px solid #ff4444;
            border-radius: 50%;
            background: rgba(255,68,68,0.15);
            box-shadow: 0 0 20px rgba(255,68,68,0.6);
            animation: pulse-mark 1.5s infinite;
            pointer-events: none;
            z-index: 10;
            transform: translate(-50%, -50%);
        }

        @keyframes pulse-mark {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
        }

        /* 标注箭头 */
        .xray-arrow {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 30px solid #ffaa00;
            filter: drop-shadow(0 0 10px #ffaa00);
            animation: arrow-bounce 1s infinite;
            pointer-events: none;
            z-index: 10;
            transform: translate(-50%, -50%) rotate(45deg);
        }

        @keyframes arrow-bounce {
            0%, 100% { transform: translate(-50%, -50%) rotate(45deg) translateY(0); }
            50% { transform: translate(-50%, -50%) rotate(45deg) translateY(-8px); }
        }

        /* 标注标签 */
        .xray-label {
            position: absolute;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            border-left: 4px solid #ff4444;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 10;
            transform: translate(0, -50%);
        }

        /* 测量线 */
        .xray-measure-line {
            position: absolute;
            height: 3px;
            background: #00ccff;
            transform-origin: left;
            box-shadow: 0 0 15px #00ccff;
            pointer-events: none;
            z-index: 10;
        }

        .xray-measure-label {
            position: absolute;
            background: rgba(0,204,255,0.9);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            pointer-events: none;
            z-index: 11;
            transform: translate(-50%, -50%);
        }

        .xray-measure-dot {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #00ccff;
            border-radius: 50%;
            box-shadow: 0 0 15px #00ccff;
            pointer-events: none;
            z-index: 10;
            transform: translate(-50%, -50%);
        }

        .camera-controls {
            background: #000;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .camera-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            border: 3px solid #666;
        }

        .camera-btn:active {
            transform: scale(0.95);
        }

        .camera-close {
            color: white;
            font-size: 30px;
            cursor: pointer;
        }

        .confirm-bar {
            background: #000;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .confirm-btn {
            background: #667eea;
            padding: 12px 30px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .retake-btn {
            color: white;
            cursor: pointer;
        }

        /* X光预览图库 */
        .xray-preview-images {
            display: flex;
            gap: 8px;
            padding: 10px;
            background: rgba(0,0,0,0.8);
            position: absolute;
            bottom: 100px;
            left: 0;
            width: 100%;
            overflow-x: auto;
            z-index: 101;
        }

        .xray-thumb {
            width: 70px;
            height: 70px;
            border-radius: 8px;
            background: #333;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid transparent;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        .xray-thumb.selected {
            border-color: #667eea;
        }

        .xray-thumb svg {
            width: 100%;
            height: 100%;
        }

        .xray-thumb-mark {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #ff4444;
            border: 2px solid white;
            border-radius: 50%;
            top: 5px;
            right: 5px;
        }
    </style>
</head>

                            <div class="list-item" onclick="navigateTo('settings')">
                                <div class="item-left">
                                    <span style="font-size: 20px;">⚙️</span>
                                    <span class="item-title">设置</span>
                                </div>
                                <span style="color: #94a3b8;">›</span>
                            </div>
                            <div class="list-item">
                                <div class="item-left">
                                    <span style="font-size: 20px;">📞</span>
                                    <span class="item-title">联系客服</span>
                                </div>
                                <span style="color: #94a3b8;">›</span>
                            </div>
                        </div>

                        <button class="btn btn-outline" style="margin-top: 20px;" onclick="navigateTo('home')">退出登录</button>
                    </div>

                    <div class="tab-bar">
                        <div class="tab-item" onclick="navigateTo('home')">
                            <span class="tab-icon">🏠</span>
                            <span>首页</span>
                        </div>
                        <div class="tab-item" onclick="navigateTo('records')">
                            <span class="tab-icon">📋</span>
                            <span>记录</span>
                        </div>
                        <div class="tab-item active" onclick="navigateTo('profile')">
                            <span class="tab-icon">👤</span>
                            <span>我的</span>
                        </div>
                    </div>
                `
            },

            // 设置
            settings: {
                content: `
                    <div class="content">
                        <div class="header">
                            <span class="back" onclick="navigateTo('profile')">←</span>
                            <span class="header-title">设置</span>
                        </div>

                        <div class="card">
                            <div class="list-item"><span>🔔 通知提醒</span> <span style="color: #667eea;">已开启</span></div>
                            <div class="list-item"><span>🔒 隐私设置</span> <span style="color: #94a3b8;">›</span></div>
                            <div class="list-item"><span>🤖 AI敏感度</span> <span>中</span></div>
                        </div>

                        <div class="card">
                            <div class="list-item"><span>📱 关于我们</span> <span>v2.0</span></div>
                            <div class="list-item"><span>📄 用户协议</span> <span>›</span></div>
                        </div>

                        <button class="btn btn-outline" onclick="navigateTo('home')">返回首页</button>
                    </div>
                `
            }
        };

        // 打开相机
        function openCamera() {
            cameraActive = true;
            photoCaptured = false;
            selectedXrayIndex = 0;
            showCamera();
        }

        // 显示相机界面
        function showCamera() {
            const xray = xrayPreviews[selectedXrayIndex];
            const app = document.getElementById('app');
            
            let marksHtml = '';
            if (xray.marks) {
                const m = xray.marks;
                marksHtml = `
                    <div class="xray-mark-circle" style="left: ${m.circle.x}%; top: ${m.circle.y}%;"></div>
                    <div class="xray-arrow" style="left: ${m.arrow.x}%; top: ${m.arrow.y}%;"></div>
                    <div class="xray-measure-dot" style="left: ${m.measure.x1}%; top: ${m.measure.y1}%;"></div>
                    <div class="xray-measure-dot" style="left: ${m.measure.x2}%; top: ${m.measure.y2}%;"></div>
                    <div class="xray-measure-line" style="left: ${m.measure.x1}%; top: ${m.measure.y1}%; width: ${Math.sqrt(Math.pow(m.measure.x2 - m.measure.x1, 2) + Math.pow(m.measure.y2 - m.measure.y1, 2)) * 3}px; transform: rotate(${Math.atan2(m.measure.y2 - m.measure.y1, m.measure.x2 - m.measure.x1)}rad);"></div>
                    <div class="xray-measure-label" style="left: ${(m.measure.x1 + m.measure.x2) / 2}%; top: ${(m.measure.y1 + m.measure.y2) / 2 - 3}%;">${m.measure.length}</div>
                    <div class="xray-label" style="left: ${m.circle.x + 5}%; top: ${m.circle.y - 8}%;">${m.label}</div>
                `;
            }

            app.innerHTML = `
                <div class="camera-fullscreen">
                    <div class="camera-view">
                        <div class="xray-container">
                            <div class="xray-svg">${xray.svg}</div>
                            ${marksHtml}
                        </div>
                    </div>
                    
                    <div class="xray-preview-images">
                        ${xrayPreviews.map((x, index) => `
                            <div class="xray-thumb ${index === selectedXrayIndex ? 'selected' : ''}" onclick="selectXrayPreview(${index})">
                                <div class="xray-svg" style="width:100%; height:100%;">${x.svg}</div>
                                ${x.diagnosis === 'fracture' ? '<div class="xray-thumb-mark"></div>' : ''}
                            </div>
                        `).join('')}
                    </div>

                    ${!photoCaptured ? `
                        <div class="camera-controls">
                            <div class="camera-close" onclick="closeCamera()">✕</div>
                            <div class="camera-btn" onclick="takePicture()">📷</div>
                            <div class="camera-close" onclick="navigateTo('gallery')">🖼️</div>
                        </div>
                    ` : `
                        <div class="confirm-bar">
                            <div class="retake-btn" onclick="retakePicture()">重拍</div>
                            <div class="confirm-btn" onclick="confirmPicture()">使用照片</div>
                        </div>
                    `}
                </div>
            `;
        }

        // 选择X光预览图
        function selectXrayPreview(index) {
            selectedXrayIndex = index;
            showCamera();
        }

        // 拍照
        function takePicture() {
            photoCaptured = true;
            showCamera();
        }

        // 重拍
        function retakePicture() {
            photoCaptured = false;
            showCamera();
        }

        // 确认使用照片
        function confirmPicture() {
            cameraActive = false;
            const selected = xrayPreviews[selectedXrayIndex];
            currentCase = {
                animal: selected.animal,
                age: selected.animal === '金毛' ? '5岁' : 
                     selected.animal === '布偶' ? '3岁' :
                     selected.animal === '泰迪' ? '2岁' : '4岁',
                gender: selected.animal === '布偶' ? '雌性' : '雄性',
                weight: selected.animal === '金毛' ? '28kg' :
                        selected.animal === '布偶' ? '4kg' :
                        selected.animal === '泰迪' ? '3kg' : '25kg',
                owner: selected.animal === '金毛' ? '蒋女士' :
                       selected.animal === '布偶' ? '李先生' :
                       selected.animal === '泰迪' ? '王女士' : '张先生',
                diagnosis: selected.diagnosis
            };
            navigateTo('loading');
        }

        // 关闭相机
        function closeCamera() {
            cameraActive = false;
            navigateTo('home');
        }

        // 选择照片函数
        function selectPhoto(id) {
            const index = id - 1;
            const selectedCase = photoCases[index];
            
            currentCase = {
                animal: selectedCase.animal,
                age: selectedCase.animal === '金毛' ? '5岁' : 
                     selectedCase.animal === '布偶' ? '3岁' :
                     selectedCase.animal === '泰迪' ? '2岁' : '4岁',
                gender: selectedCase.animal === '布偶' ? '雌性' : '雄性',
                weight: selectedCase.animal === '金毛' ? '28kg' :
                        selectedCase.animal === '布偶' ? '4kg' :
                        selectedCase.animal === '泰迪' ? '3kg' : '25kg',
                owner: selectedCase.animal === '金毛' ? '蒋女士' :
                       selectedCase.animal === '布偶' ? '李先生' :
                       selectedCase.animal === '泰迪' ? '王女士' : '张先生',
                diagnosis: selectedCase.diagnosis
            };
            
            navigateTo('loading');
        }

        // 申请会诊函数
        function applyConsult(expert) {
            consultStatus.applied = true;
            consultStatus.expert = expert;
            consultStatus.expertType = expert;
            consultStatus.result = experts[expert];
            navigateTo('consult-waiting');
        }

        // 查看会诊结果
        function checkConsultResult() {
            if (consultStatus.result) {
                if (consultStatus.expert === '李专家') {
                    navigateTo('consult-result-li');
                } else if (consultStatus.expert === '王专家') {
                    navigateTo('consult-result-wang');
                } else {
                    navigateTo('consult-result-li');
                }
            } else {
                alert('专家还未回复，请稍后再试');
            }
        }

        // 导航函数
        function navigateTo(page) {
            if (cameraActive) {
                cameraActive = false;
            }
            if (pages[page]) {
                document.getElementById('app').innerHTML = pages[page].content;
                window.scrollTo(0, 0);
            } else {
                navigateTo('home');
            }
        }

        // 自动跳转：加载页3秒后到结果页
        let loadingTimer = null;
        const originalNavigate = navigateTo;
        navigateTo = function(page) {
            if (loadingTimer) clearTimeout(loadingTimer);
            
            if (page === 'loading') {
                originalNavigate('loading');
                loadingTimer = setTimeout(() => {
                    if (currentCase.diagnosis === 'fracture') {
                        navigateTo('result-fracture');
                    } else {
                        navigateTo('result-normal');
                    }
                }, 3000);
            } else {
                originalNavigate(page);
            }
        };

        // 初始化
        window.onload = () => {
            navigateTo('home');
        };
    </script>
</body>
</html>
